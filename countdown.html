<p id="status">時刻取得元：<span id="clock-src">端末 or World Time API</span><br>

<p id="clock"><span id="date">2025年1月1日 (水)</span> <span id="time">0:00:00</span></p>

<p id="timer">0:00:00</p>
<p id="desc">APIから正確な時刻を取得し、端末の時刻との差を求めて表示する、正確な年越しカウントダウンです。<br>
	(時刻表示誤差 = JavaScript処理時間 = <span id="exec-time">0.0000秒</span>)<br>
	再読込でAPIから時刻を再取得しますが、数秒間で大量に行うと制限がかかります。<br>
	APIから時刻を取得できない場合、端末の時刻を使用します。<br>
	15分ごとに自動で再読込します。</p>
